{% extends "base.html" %}
{% block title %}研究成果一覧{% endblock %}
{% block css %}
    <link rel="stylesheet" href="/static/studylist.css">
{% endblock %}
{% block content %}
    <h1>研究成果一覧</h1>
    <table border="1">
        <tr>
            <th>題名</th>
            <th>要約</th>
            <th>ダウンロード</th>
        </tr>
        {%for study in studies%}
        <tr>
            <td>{{study[1]}}</td>
            <td>{{study[2]}}</td>
            <td><a href="/uploads/{{study[4]}}">{{study[3]}}</a></td>
        </tr>
        {% endfor %}
    </table><br>
    <a href="/">ホームへ戻る</a>
{% endblock %}
{% block script %}
{% endblock %}
